<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>9BOX</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    .contenedor {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    /* TARJETA */
    .card {
      width: 220px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* FOTO */
    .card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #ddd;
    }

    /* INFO */
    .card-body {
      padding: 12px;
      text-align: center;
    }

    .nombre {
      font-size: 16px;
      font-weight: bold;
      margin: 5px 0;
    }

    .cargo {
      font-size: 14px;
      color: black;
      margin-bottom: 8px;
    }

    .cc {
      font-size: 12px;
      color: #888;
    }

    /* BADGE opcional */
    .badge {
      display: inline-block;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 6px;
      background: #e3f2fd;
      color: #1976d2;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <h2>👥 Empleados 9BOX</h2>

  <div id="contenedor" class="contenedor"></div>

  <script src="app.js"></script>

</body>
</html>
